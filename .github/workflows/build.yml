name: Build FastPaste Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux-deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby rubygems ruby-dev libqt6gui6 libqt6widgets6
          sudo gem install fpm
          pip install -r requirements.txt
          pip install pyinstaller
          
      - name: Build binary with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name fast-paste fast_paste.py
          
      - name: Package into .deb
        run: |
          # Create deb structure
          mkdir -p build_deb/usr/bin
          mkdir -p build_deb/usr/share/applications
          
          # Copy binary
          cp dist/fast-paste build_deb/usr/bin/
          chmod +x build_deb/usr/bin/fast-paste
          
          # Create .desktop file
          cat <<EOF > build_deb/usr/share/applications/fast-paste.desktop
          [Desktop Entry]
          Name=FastPaste
          Exec=/usr/bin/fast-paste run
          Icon=edit-paste
          Type=Application
          Categories=Utility;
          EOF
          
          # Format version tag
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          
          fpm -s dir -t deb \
            -n fast-paste \
            -v $VERSION \
            --architecture amd64 \
            --maintainer "FastPaste Team" \
            --description "Cross-platform clipboard manager" \
            -C build_deb \
            usr
            
      - name: Upload .deb to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: fast-paste_*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build binary
        run: pyinstaller --onefile --windowed --name fast_paste fast_paste.py
      - name: Upload .exe to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/fast_paste.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build binary
        run: |
          pyinstaller --windowed --name fast_paste fast_paste.py
          cd dist
          zip -r fast_paste_macos.zip fast_paste.app
      - name: Upload .app to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/fast_paste_macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
