name: Build FastPaste Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8

jobs:
  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libqt6gui6 libqt6widgets6 xvfb
          pip install -r requirements.txt
          pip install pyinstaller pillow
          
      - name: Build binary and package .deb
        run: |
          xvfb-run -a python scripts/build.py
          
      - name: Upload .deb to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/fpaste_*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pillow
      - name: Build binary
        run: python scripts/build.py
      - name: Upload .exe to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/fpaste.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pillow
      - name: Build binary
        run: |
          python scripts/build.py
          xattr -cr dist/fpaste.app
          rm -rf dist/dmg-staging
          mkdir -p dist/dmg-staging
          cp -R dist/fpaste.app dist/dmg-staging/
          hdiutil create -volname FPaste -srcfolder dist/dmg-staging -ov -format UDZO dist/fpaste.dmg
      - name: Upload .dmg to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/fpaste.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
